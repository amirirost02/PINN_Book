<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فصل [شماره]: [عنوان]</title>

    <!-- لینک به فونت‌ها -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">

    <!-- لینک به استایل و اسکریپت مشترک -->
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <!-- MathJax برای فرمول‌ها -->
    <script>
        MathJax = {
            tex: {
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ],
                processEscapes: true
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" id="MathJax-script" async></script>
</head>
<body>

    <div class="book-page">

        <!-- ========================================================== -->
        <!-- سرصفحه (نام فصل) -->
        <!-- ========================================================== -->
        <div class="header-line">
            <span class="header-left">فصل [شماره]</span>
            <span class="header-right">[عنوان]</span>
        </div>

        <!-- ========================================================== -->
        <!-- فاصله‌ی ۱۰۰px از بالا -->
        <!-- ========================================================== -->
        <div class="chapter-spacer"></div>

        <!-- ========================================================== -->
        <!-- عنوان اصلی فصل -->
        <!-- ========================================================== -->
        <h1>فصل [شماره]: [عنوان کامل]</h1>

        <!-- ========================================================== -->
        <!-- محتوای فصل (اینجا جایگزین می‌شود) -->
        <!-- ========================================================== -->

        <!-- ========================================================== -->
        <!-- پانویس (شماره صفحه) -->
        <!-- ========================================================== -->
        <div class="footer-line">
            — [شماره صفحه] —
        </div>

    </div>

</body>
</html>
